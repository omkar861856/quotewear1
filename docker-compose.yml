version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: medusa-db

  # 2. Redis Cache
  redis:
    image: redis:alpine

  # 3. Medusa Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgrespassword@postgres:5432/medusa-db?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - HOST=0.0.0.0
      # You will need to update these in Zeabur once you generate the public domains
      - STORE_CORS=http://43.166.254.141:8000
      - ADMIN_CORS=http://43.166.254.141:9000
      - JWT_SECRET=supersecret
      - COOKIE_SECRET=supersecret
    ports:
      - "9000:9000"
    depends_on:
      - postgres
      - redis

  # 4. Next.js Storefront
  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://43.166.254.141:9000
        - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=pk_fbb73c332f429bd57fd1beb9a5911fb18749d6083f4628e2e0b941eab32a41b5
    environment:
      # You will need to update this to the public URL of the backend
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://43.166.254.141:9000
      - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=pk_fbb73c332f429bd57fd1beb9a5911fb18749d6083f4628e2e0b941eab32a41b5
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      - backend

  # 5. Reverse Proxy
  proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - storefront
