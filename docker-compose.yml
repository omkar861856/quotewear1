version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15
    env_file:
      - .env

  # 2. Redis Cache
  redis:
    image: redis:alpine

  # 3. Medusa Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
    ports:
      - "9000:9000"
    depends_on:
      - postgres
      - redis

  # 4. Next.js Storefront
  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
      network: host
      extra_hosts:
        - "admin.quotewear.store:127.0.0.1"
      args:
        - NEXT_PUBLIC_MEDUSA_BACKEND_URL=${NEXT_PUBLIC_MEDUSA_BACKEND_URL}
        - NODE_TLS_REJECT_UNAUTHORIZED=${NODE_TLS_REJECT_UNAUTHORIZED}
        - NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
    env_file:
      - .env
    environment:
      - PORT=8000
    ports:
      - "8000:8000"
    depends_on:
      - backend

  # 5. Reverse Proxy
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - storefront
